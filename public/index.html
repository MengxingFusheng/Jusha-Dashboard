<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dash Board</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-login">
        <form id="loginForm" class="login-form compact-login">
          <input id="loginUsername" name="username" type="text" autocomplete="username" placeholder="??">
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="??">
          <button id="loginButton" type="submit">??</button>
        </form>
        <div class="topbar-login-status">
          <span id="cookieBadge" class="badge muted">??? Cookie</span>
          <span id="loginMessage"></span>
        </div>
      </div>

      <div class="topbar-title">
        <h1>Dash Board</h1>
        <p id="targetLabel" class="sr-only">????????...</p>
      </div>

      <div class="actions">
        <span id="runStatus" class="badge muted">????</span>
        <span id="lastRun" class="badge muted">???? -</span>
        <label class="frequency-control">
          <span>????</span>
          <select id="intervalSeconds">
            <option value="10">10 ?</option>
            <option value="30">30 ?</option>
            <option value="60">1 ??</option>
            <option value="120">2 ??</option>
            <option value="300">5 ??</option>
            <option value="600">10 ??</option>
          </select>
        </label>
        <button id="checkNow" type="button">????</button>
      </div>
    </header>

    <main>
      <section class="panel resource-panel">
        <div class="panel-head">
          <div class="panel-title-block">
            <h2>??????</h2>
            <span id="resourceCount" class="badge muted">0 ?</span>
            <label class="tile-scale-control" title="????????">
              <span>??</span>
              <input id="resourceTileScale" type="range" min="0.85" max="1.3" step="0.05" value="1" aria-label="??????">
              <output id="resourceTileScaleValue">100%</output>
            </label>
          </div>
          <div id="hiddenMenu" class="hidden-menu"></div>
        </div>
        <div id="resources" class="resource-tiles"></div>
      </section>

      <section class="panel income-panel">
        <div class="panel-head">
          <div class="panel-title-block">
            <h2>??</h2>
            <span id="incomeBadge" class="badge muted">??????</span>
            <label class="tile-scale-control" title="????????">
              <span>??</span>
              <input id="incomeTileScale" type="range" min="0.85" max="1.3" step="0.05" value="1" aria-label="??????">
              <output id="incomeTileScaleValue">100%</output>
            </label>
          </div>
          <div class="actions compact">
            <button id="incomeCheckNow" type="button">??????</button>
          </div>
        </div>
        <div id="incomeSummary" class="income-summary"></div>
        <div id="incomeTiles" class="income-tiles"></div>
      </section>

      <section class="workspace">
        <section id="nodeAlertPanel" class="panel node-alert-panel">
          <div class="panel-head">
            <div>
              <h2>????</h2>
              <p id="selectedNodeLabel" class="subtle">???????</p>
            </div>
            <div class="actions compact">
              <button id="addNodeAlert" type="button">????</button>
              <button id="saveNodeAlerts" type="button">????</button>
            </div>
          </div>
          <div id="nodeAlertList" class="node-alert-list"></div>
          <p id="nodeAlertMessage" class="message"></p>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>????</h2>
            <div class="actions compact">
              <span id="alertCount" class="badge muted">0 ?</span>
              <button id="clearAlertLogs" type="button" class="ghost-button danger">????</button>
            </div>
          </div>
          <div id="alertLogs" class="alert-list"></div>
        </section>
      </section>

      <section class="workspace single-row">
        <section class="panel serverchan-panel">
          <div class="panel-head">
            <h2>Server???</h2>
            <div class="actions compact">
              <span id="serverChanBadge" class="badge muted">?????</span>
              <button id="testServerChan" type="button">????</button>
              <button id="saveServerChanSettings" type="button">????</button>
            </div>
          </div>
          <form id="serverChanForm" class="email-form">
            <label class="switch-row">
              <span>?? Server???</span>
              <input id="serverChanEnabled" type="checkbox">
            </label>
            <label>
              <span>SendKey</span>
              <input id="serverChanSendKey" type="password" autocomplete="new-password" placeholder="???????? SendKey">
            </label>
            <label>
              <span>??????</span>
              <input id="subjectPrefix" type="text" placeholder="[Resource Monitor Alert]">
            </label>
            <label>
              <span>???????</span>
              <input id="cooldownSeconds" type="number" min="0" step="1">
            </label>
          </form>
          <p id="serverChanMessage" class="message"></p>
        </section>
      </section>

      <p id="saveMessage" class="message global-message"></p>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
